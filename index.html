<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ovro Trader</title>

<style>

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.card{

background:#111827;
padding:40px;
border-radius:25px;
text-align:center;
width:300px;
box-shadow:0 0 40px #00ffff50;
}

.title{
color:#b3faff;
font-size:28px;
letter-spacing:3px;
margin-bottom:20px;
}

.signal{

font-size:60px;
color:#00ff88;
text-shadow:0 0 25px #00ff88;
margin:10px 0;
}

.time{

color:#00eaff;
font-size:22px;
margin-top:15px;
}

.next{

color:#00eaff;
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<div class="title">MR TRADER</div>

<div id="signal" class="signal">BIG</div>

<div id="clock" class="time"></div>

<div class="next">Next: <span id="timer">30</span>s</div>

</div>

<script>

let time=30

function updateClock(){

let now=new Date()

document.getElementById("clock").innerHTML=
now.getHours()+":"+
now.getMinutes()+":"+
now.getSeconds()

time--

if(time<=0){

time=30

let signals=["BIG","SMALL"]

let random=Math.floor(Math.random()*2)

document.getElementById("signal").innerHTML=signals[random]

}

document.getElementById("timer").innerHTML=time

}

setInterval(updateClock,1000)

</script>

</body>
                              </html>
